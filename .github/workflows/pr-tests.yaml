name: PR Tests on Windows

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        id: tests
        continue-on-error: true
        run: |
          pytest --junitxml=test-results.xml
        # Можно добавить запись статуса, но для простоты используем job.status

      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            📦 **Pull Request #${{ github.event.pull_request.number }}**
            **Название:** ${{ github.event.pull_request.title }}
            **Автор:** ${{ github.event.pull_request.user.login }}
            **Ветка:** ${{ github.event.pull_request.head.ref }} → ${{ github.event.pull_request.base.ref }}
            **Статус тестов:** ${{ job.status == 'success' && '✅ Успешно' || '❌ Провал' }}
            **Ссылка:** ${{ github.event.pull_request.html_url }}
        if: always()   # отправляем в любом случае