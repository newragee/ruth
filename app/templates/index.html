{% extends "base.html" %}

{% block title %}Главная{% endblock %}

{% block content %}
<h1>Добро пожаловать в Health Chat</h1>
<div id="auth-section">
    <!-- Эта часть будет заполняться через JavaScript -->
</div>
<div id="main-menu" style="display: none;">
    <div style="display: flex; gap: 20px; margin-top: 20px;">
        <a href="/chat"><button>Чат с нейросетью</button></a>
        <a href="/stats"><button>Статистика здоровья</button></a>
        <a href="/notifications"><button>Уведомления</button></a>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const token = getToken();
        const authSection = document.getElementById('auth-section');
        const mainMenu = document.getElementById('main-menu');
        if (token) {
            authSection.innerHTML = '<p>Вы авторизованы. <a href="#" id="logout">Выйти</a></p>';
            mainMenu.style.display = 'block';
            document.getElementById('logout').addEventListener('click', (e) => {
                e.preventDefault();
                localStorage.removeItem('token');
                window.location.reload();
            });
        } else {
            authSection.innerHTML = '<p><a href="/login">Войти</a> | <a href="/register">Зарегистрироваться</a></p>';
            mainMenu.style.display = 'none';
        }
    });
</script>
{% endblock %}
